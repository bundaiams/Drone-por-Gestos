[env:nanoatmega328new]
platform = atmelavr
board = nanoatmega328new
framework = arduino
lib_deps = 
	jrowberg/I2Cdevlib-MPU6050@^1.0.0
	nrf24/RF24@^1.6.0
	arduino-libraries/Servo@^1.3.0
	adafruit/Adafruit Unified Sensor@^1.1.15
	adafruit/Adafruit SSD1306@^2.5.16
